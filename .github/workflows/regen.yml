name: regen-and-deploy

# Rebuild the PEP 503 simple index from current GitHub Release assets across
# the pdomain Python repos and deploy via GitHub Pages artifact actions.
#
# Triggers:
#   - schedule: daily (safety net; catches releases we didn't
#     receive a dispatch for, e.g. if a repo's release.yml hasn't been
#     wired to ping us yet).
#   - workflow_dispatch: manual rebuild from the Actions tab.
#   - workflow_call: called by release.yml after publishing this repo's
#     GitHub Release.
#   - repository_dispatch type=pd-release-published: fired by individual pdomain
#     repos after their release.yml publishes a new GitHub Release. Lets the
#     index update instantly instead of waiting for the daily cron.
#
# Read-only public GitHub API access is enough for the regen script — the
# default GITHUB_TOKEN can list releases on any public repo, no PAT needed.

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  workflow_call:
  repository_dispatch:
    types: [pd-release-published]

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 now; Node 20 is deprecated on the runner and will be the
# default in June 2026. Most pinned actions below are still on Node 20 today
# (no Node-24-native release available) — this env var forces them onto 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UV_PYTHON: "3.12"

# Chore: review pinned action SHAs weekly. Update the version comment and the
# full commit SHA together after checking the upstream release tag.

# Don't queue Pages deployments — if a newer regen kicks off mid-deploy,
# let it finish and then run again. cancel-in-progress: false is the
# documented setting for Pages workflows.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: Regenerate simple index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make regen OUT=_site/simple

      - name: Add a friendly root landing page
        run: |
          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html><head><title>pdomain-index-pip</title></head><body>
          <h1>pdomain-index-pip</h1>
          <p>Self-hosted PEP 503 simple Python package index for the
          pdomain Python repos under
          <a href="https://github.com/pdomain">pdomain</a>.</p>
          <p>The index lives at <a href="simple/">simple/</a>.</p>
          <p>Source: <a href="https://github.com/pdomain/pdomain-index-pip">github.com/pdomain/pdomain-index-pip</a></p>
          </body></html>
          HTML

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
